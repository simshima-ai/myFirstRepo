<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>S-CAD Logo Canvas Animation</title>
  <style>
    :root {
      --bg0: #071021;
      --bg1: #0c1b34;
      --ink: #d9e9ff;
      --muted: #8fa9cb;
      --line: #8bc3ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background:
        radial-gradient(900px 520px at 20% 10%, rgba(40, 126, 255, 0.22), transparent 60%),
        radial-gradient(900px 480px at 82% 80%, rgba(94, 182, 255, 0.15), transparent 62%),
        linear-gradient(160deg, var(--bg0), var(--bg1));
      padding: 24px;
    }
    .wrap {
      width: min(1180px, 96vw);
      border: 1px solid rgba(151, 197, 255, 0.22);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(10, 22, 42, 0.85), rgba(7, 14, 29, 0.92));
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.4);
      padding: 18px;
    }
    .head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 12px;
    }
    .head h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0.02em;
      font-weight: 700;
    }
    .head p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }
    canvas {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      border: 1px solid rgba(151, 197, 255, 0.16);
      background: rgba(2, 8, 19, 0.45);
    }
  </style>
</head>

    <div class="head">
      <h1>S-CAD Logo Animation (Canvas2D)</h1>
      <p>area color animation / blue palette</p>

    const H = canvas.height;
    const PADDING = 24;

    const boundaryCanvas = document.createElement("canvas");
    boundaryCanvas.width = W;
    boundaryCanvas.height = H;

    function getWorldBounds(shapeList) {
      let minX = Infinity;
      let minY = Infinity;
      let maxX = -Infinity;
      let maxY = -Infinity;

      for (const s of shapeList) {
        if (s.type === "line") {
          minX = Math.min(minX, s.x1, s.x2);
          minY = Math.min(minY, s.y1, s.y2);
          maxX = Math.max(maxX, s.x1, s.x2);
          maxY = Math.max(maxY, s.y1, s.y2);
        } else if (s.type === "arc") {
          minX = Math.min(minX, s.cx - s.r);
          minY = Math.min(minY, s.cy - s.r);

          maxY = Math.max(maxY, s.cy + s.r);

      }

      const sx = (W - PADDING * 2) / (maxX - minX || 1);
      const sy = (H - PADDING * 2) / (maxY - minY || 1);
      const scale = Math.min(sx, sy);

      return {
        minX,
        minY,
        maxX,
        maxY,
        scale,
        tx: PADDING - minX * scale,
        ty: PADDING - minY * scale,
      };
    }

    function worldToCanvas(x, y) {
      return {
        x: world.scale * x + world.tx,
        y: world.scale * y + world.ty,
      };
    }

    function canvasToWorld(x, y) {
      return {
        x: (x - world.tx) / world.scale,
        y: (y - world.ty) / world.scale,
      };
    }

    function beginWorldTransform(targetCtx) {
      targetCtx.setTransform(world.scale, 0, 0, world.scale, world.tx, world.ty);
    }

    function appendArcPath(targetCtx, s) {
      const start = s.a1;
      let end = s.a2;
      const ccw = !!s.ccw;
      const p0 = worldToCanvas(
        s.cx + s.r * Math.cos(start),
        s.cy + s.r * Math.sin(start),
      );
      targetCtx.moveTo(p0.x, p0.y);

      if (ccw) {
        while (end <= start) end += TAU;
      } else {
        while (end >= start) end -= TAU;
      }

      const sweep = end - start;
      const steps = Math.max(8, Math.ceil(Math.abs(sweep) * s.r * 2));
      for (let i = 1; i <= steps; i += 1) {
        const t = start + (sweep * i) / steps;
        const p = worldToCanvas(
          s.cx + s.r * Math.cos(t),
          s.cy + s.r * Math.sin(t),
        );
        targetCtx.lineTo(p.x, p.y);
      }
    }

    function drawShapeEdges(targetCtx, strokeStyle, lineWidthPx, glow = false) {
      targetCtx.save();
      targetCtx.lineCap = "round";
      targetCtx.lineJoin = "round";
      targetCtx.strokeStyle = strokeStyle;
      targetCtx.lineWidth = lineWidthPx;
      if (glow) {
        targetCtx.shadowBlur = 22;
        targetCtx.shadowColor = "rgba(110, 190, 255, 0.55)";
      }

      for (const s of shapes) {
        targetCtx.beginPath();
        if (s.type === "line") {
          const p1 = worldToCanvas(s.x1, s.y1);
          const p2 = worldToCanvas(s.x2, s.y2);
          targetCtx.moveTo(p1.x, p1.y);
          targetCtx.lineTo(p2.x, p2.y);
        } else if (s.type === "arc") {
          appendArcPath(targetCtx, s);
        }
        targetCtx.stroke();
      }

      targetCtx.restore();
    }

    function findRegions() {
      boundaryCtx.clearRect(0, 0, W, H);
      drawShapeEdges(boundaryCtx, "#000", 4.2);

      const src = boundaryCtx.getImageData(0, 0, W, H).data;
      const len = W * H;

      const barrier = new Uint8Array(len);
      for (let i = 0; i < len; i += 1) {
        barrier[i] = src[i * 4 + 3] > 20 ? 1 : 0;
      }

      const outside = new Uint8Array(len);
      const queue = new Int32Array(len);
      let qh = 0;
      let qt = 0;

      function pushOutside(idx) {
        if (idx < 0 || idx >= len) return;
        if (outside[idx] || barrier[idx]) return;
        outside[idx] = 1;
        queue[qt++] = idx;
      }

      for (let x = 0; x < W; x += 1) {
        pushOutside(x);
        pushOutside((H - 1) * W + x);
      }
      for (let y = 0; y < H; y += 1) {
        pushOutside(y * W);
        pushOutside(y * W + (W - 1));
      }

      while (qh < qt) {
        const idx = queue[qh++];
        const x = idx % W;
        const y = (idx / W) | 0;
        if (x > 0) pushOutside(idx - 1);
        if (x + 1 < W) pushOutside(idx + 1);
        if (y > 0) pushOutside(idx - W);
        if (y + 1 < H) pushOutside(idx + W);
      }

      regionIdByPixel = new Int16Array(len);
      regionIdByPixel.fill(-1);
      regions = [];

      const visited = new Uint8Array(len);
      const aShapes = shapes.filter((s) => s.groupId === 117);
      const aBounds = getWorldBounds(aShapes);
      const aAnchorX = (aBounds.minX + aBounds.maxX) * 0.5;
      const aAnchorY = aBounds.minY + (aBounds.maxY - aBounds.minY) * 0.25;

      function collectComponent(startIdx) {
        let head = 0;
        let tail = 0;
        queue[tail++] = startIdx;
        visited[startIdx] = 1;

        const pixels = [];

        while (head < tail) {
          const idx = queue[head++];
          pixels.push(idx);

          const x = idx % W;
          const y = (idx / W) | 0;

          const n1 = idx - 1;
          const n2 = idx + 1;
          const n3 = idx - W;
          const n4 = idx + W;

          if (x > 0 && !visited[n1] && !barrier[n1] && !outside[n1]) {
            visited[n1] = 1;
            queue[tail++] = n1;
          }
          if (x + 1 < W && !visited[n2] && !barrier[n2] && !outside[n2]) {
            visited[n2] = 1;
            queue[tail++] = n2;
          }
          if (y > 0 && !visited[n3] && !barrier[n3] && !outside[n3]) {
            visited[n3] = 1;
            queue[tail++] = n3;
          }
          if (y + 1 < H && !visited[n4] && !barrier[n4] && !outside[n4]) {
            visited[n4] = 1;
            queue[tail++] = n4;
          }
        }

        return pixels;
      }

      const MIN_REGION_AREA = 24;
      for (let i = 0; i < len; i += 1) {
        if (visited[i] || barrier[i] || outside[i]) continue;
        const pixels = collectComponent(i);
        if (pixels.length < MIN_REGION_AREA) continue;

        let sumX = 0;
        let sumY = 0;
        for (const p of pixels) {
          sumX += p % W;
          sumY += (p / W) | 0;
        }
        const centerPx = sumX / pixels.length;
        const centerPy = sumY / pixels.length;
        const centerWorld = canvasToWorld(centerPx, centerPy);

        const isDHole =
          centerWorld.x > 87 && centerWorld.x < 96 &&
          centerWorld.y > -7 && centerWorld.y < 7;

        const regionId = regions.length;
        for (const p of pixels) regionIdByPixel[p] = regionId;
        regions.push({
          pixels,
          phase: (regionId * 1.37) % (Math.PI * 2),
          speed: 0.0008 + (regionId % 7) * 0.00011,
          skipFill: isDHole,
        });
      }

      function pickRegionAtWorld(wx, wy, radiusPx = 4) {
        const p = worldToCanvas(wx, wy);
        const cx = Math.round(p.x);
        const cy = Math.round(p.y);
        for (let r = 0; r <= radiusPx; r += 1) {
          for (let dy = -r; dy <= r; dy += 1) {
            for (let dx = -r; dx <= r; dx += 1) {
              const x = cx + dx;
              const y = cy + dy;
              if (x < 0 || x >= W || y < 0 || y >= H) continue;
              const rid = regionIdByPixel[y * W + x];
              if (rid >= 0) return rid;
            }
          }
        }
        return -1;
      }

      const aHoleRegionId = pickRegionAtWorld(aAnchorX, aAnchorY, 6);
      if (aHoleRegionId >= 0 && regions[aHoleRegionId]) {
        regions[aHoleRegionId].skipFill = true;
      }
    }

    function hslToRgb(h, s, l) {
      const hh = ((h % 360) + 360) % 360;
      const ss = Math.max(0, Math.min(100, s)) / 100;
      const ll = Math.max(0, Math.min(100, l)) / 100;

      const c = (1 - Math.abs(2 * ll - 1)) * ss;
      const x = c * (1 - Math.abs(((hh / 60) % 2) - 1));
      const m = ll - c / 2;
      let r = 0;
      let g = 0;
      let b = 0;

      if (hh < 60) [r, g, b] = [c, x, 0];
      else if (hh < 120) [r, g, b] = [x, c, 0];
      else if (hh < 180) [r, g, b] = [0, c, x];
      else if (hh < 240) [r, g, b] = [0, x, c];
      else if (hh < 300) [r, g, b] = [x, 0, c];
      else [r, g, b] = [c, 0, x];

      return {
        r: ((r + m) * 255) | 0,
        g: ((g + m) * 255) | 0,
        b: ((b + m) * 255) | 0,
      };
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#061025");
      g.addColorStop(1, "#0b1934");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      const rg = ctx.createRadialGradient(W * 0.22, H * 0.15, 40, W * 0.22, H * 0.15, W * 0.5);
      rg.addColorStop(0, "rgba(96, 167, 255, 0.20)");
      rg.addColorStop(1, "rgba(96, 167, 255, 0)");
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    function animate(ts) {
      drawBackground();

      const image = fillCtx.createImageData(W, H);
      const px = image.data;
      const palette = new Array(regions.length);

      for (let i = 0; i < regions.length; i += 1) {
        const r = regions[i];
        const t = ts * r.speed + r.phase;
        const hue = 201 + 16 * Math.sin(t) + ((i * 11) % 10) - 5;
        const sat = 62 + 16 * Math.sin(t * 0.91 + 0.4);
        const lit = 42 + 14 * Math.sin(t * 1.22 + 1.1);
        palette[i] = hslToRgb(hue, sat, lit);
      }

      for (let i = 0, p = 0; i < regionIdByPixel.length; i += 1, p += 4) {
        const regionId = regionIdByPixel[i];
        if (regionId < 0) continue;
        if (regions[regionId]?.skipFill) continue;
        const c = palette[regionId];
        px[p] = c.r;
        px[p + 1] = c.g;
        px[p + 2] = c.b;
        px[p + 3] = 255;
      }

      fillCtx.putImageData(image, 0, 0);
      ctx.drawImage(fillCanvas, 0, 0);

      drawShapeEdges(ctx, "rgba(200, 228, 255, 0.95)", 1.4, true);
      drawShapeEdges(ctx, "rgba(120, 186, 255, 0.85)", 0.8, false);

      requestAnimationFrame(animate);
    }

    async function loadLogoData() {
      const inline = document.getElementById("logoData");
      const inlineText = inline?.textContent || "";
      const readInline = () => {
        if (!inline) throw new Error("logo data not found");
        if (!inlineText.trim()) throw new Error("inline logo data is empty");
        return JSON.parse(inlineText);
      };

      if (location.protocol === "file:") {
        return readInline();
      }

      try {
        const res = await fetch("./assets/s-cad_logo.json", { cache: "no-store" });
        if (res.ok) return await res.json();
      } catch (e) {
        // file:// 直開き時は fetch が CORS で失敗するため埋め込みJSONへフォールバック
      }

      return readInline();
    }

    async function boot() {
      const data = await loadLogoData();
      shapes = Array.isArray(data?.model?.shapes) ? data.model.shapes : [];
      if (!shapes.length) throw new Error("shape data is empty");

      world = getWorldBounds(shapes);
      findRegions();
      requestAnimationFrame(animate);
    }
    boot().catch((err) => {
      console.error(err);
      drawBackground();
      ctx.fillStyle = "#ffb4c6";
      ctx.font = "14px sans-serif";
      ctx.fillText("logo data load error", 20, 30);
    });
  </script>
</body>
</html>
